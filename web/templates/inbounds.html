{% extends "base.html" %}
{% block content %}
<div class="page">
  <div class="page-title-row">
    <div>
      <h1>{{ t('inbounds') }}</h1>
      <p>{{ t('detected_inbounds') }}</p>
    </div>
    <div class="endpoint-actions export-actions">
      <button type="button" class="btn" id="copy-all-clients">{{ t('copy_all_clients') }}</button>
      <button type="button" class="btn" id="download-client-text">{{ t('download_links') }}</button>
      <button type="button" class="btn btn-primary" id="download-client-export">{{ t('download_export') }}</button>
    </div>
  </div>
  <div id="inbounds-list">{{ t('loading') }}</div>
</div>

<dialog id="inbound-edit-dialog" class="edit-dialog">
  <form id="inbound-edit-form">
    <div class="dialog-title-row">
      <h2>{{ t('edit_inbound') }}</h2>
      <button type="button" class="btn btn-sm" id="close-inbound-editor">{{ t('cancel') }}</button>
    </div>
    <input type="hidden" id="edit-original-tag">
    <div class="form-group">
      <label for="edit-inbound-json">{{ t('server_inbound_json') }}</label>
      <textarea id="edit-inbound-json" class="json-editor" spellcheck="false" required></textarea>
      <div class="form-help">{{ t('server_inbound_json_help') }}</div>
    </div>
    <div class="form-group">
      <label for="edit-endpoint-profile">{{ t('client_endpoint_profile') }}</label>
      <textarea id="edit-endpoint-profile" class="json-editor json-editor-small" spellcheck="false" required></textarea>
      <div class="form-help">{{ t('client_endpoint_profile_help') }}</div>
    </div>
    <label class="check-row">
      <input type="checkbox" id="edit-restart" checked>
      <span>{{ t('restart_after_save') }}</span>
    </label>
    <div id="edit-inbound-error" class="form-error" role="alert"></div>
    <button type="submit" class="btn btn-primary" id="save-inbound-edit">{{ t('save_changes') }}</button>
  </form>
</dialog>
{% endblock %}
{% block scripts %}
<script>
window.INBOUNDS_I18N = {{ {
  'no_inbounds': t('no_inbounds'),
  'running': t('running'),
  'stopped': t('stopped'),
  'protocol': t('protocol'),
  'listen': t('listen'),
  'tls': t('tls_key'),
  'enabled': t('enabled'),
  'disabled': t('disabled'),
  'transport': t('transport'),
  'users': t('users_keys'),
  'not_recognized': t('not_recognized'),
  'no_endpoint': t('no_public_endpoint'),
  'reveal': t('click_to_reveal'),
  'hide': t('click_to_hide'),
  'copy': t('copy'),
  'copied': t('copied'),
  'client_json': t('client_json'),
  'qr_code': t('qr_code'),
  'edit': t('edit'),
  'delete': t('delete'),
  'confirm_delete': t('confirm_delete'),
  'export_empty': t('export_empty'),
  'saved': t('saved')
}|tojson }};
</script>
<script src="/static/js/inbounds.js"></script>
{% endblock %}
