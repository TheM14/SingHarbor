{% extends "base.html" %}
{% block content %}
<div class="setup-page">
  <h1>{{ t('setup_title') }}</h1>
  <p>{{ t('setup_desc') }}</p>
  <form id="setup-form" class="form-card">
    <div class="form-group">
      <label for="username">{{ t('username') }}</label>
      <input type="text" id="username" name="username" required autofocus>
    </div>
    <div class="form-group">
      <label for="password">{{ t('setup_pwd') }}</label>
      <input type="password" id="password" name="password" required minlength="8">
    </div>
    <div class="form-group">
      <label for="password_confirm">{{ t('setup_pwd2') }}</label>
      <input type="password" id="password_confirm" required minlength="8">
    </div>
    <div class="form-error" id="setup-error" style="display:none"></div>
    <button type="submit" class="btn btn-primary">{{ t('setup_btn') }}</button>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('setup-form').addEventListener('submit', async function(e){
  e.preventDefault();
  var err = document.getElementById('setup-error');
  var p1 = document.getElementById('password').value;
  var p2 = document.getElementById('password_confirm').value;
  if (p1 !== p2) { err.textContent = 'Passwords do not match'; err.style.display = 'block'; return; }
  var btn = e.target.querySelector('button'); setLoading(btn);
  try {
    var r = await fetch('/setup/initialize', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('username').value,password:p1})});
    var d = await r.json();
    if (r.ok) { window.location.href = '/login'; }
    else { err.textContent = d.error; err.style.display = 'block'; }
  } catch(ex) { err.textContent = 'Connection failed'; err.style.display = 'block'; }
  finally { resetLoading(btn); }
});
</script>
{% endblock %}
