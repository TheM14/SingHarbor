{% extends "base.html" %}
{% block content %}
<div class="login-page">
  <h1>{{ t('login_title') }}</h1>
  <form id="login-form" class="form-card">
    <div class="form-group">
      <label for="username">{{ t('username') }}</label>
      <input type="text" id="username" name="username" required autofocus>
    </div>
    <div class="form-group">
      <label for="password">{{ t('password') }}</label>
      <input type="password" id="password" name="password" required>
    </div>
    <div class="form-error" id="login-error" style="display:none"></div>
    <button type="submit" class="btn btn-primary">{{ t('login_btn') }}</button>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('login-form').addEventListener('submit', async function(e){
  e.preventDefault();
  var err = document.getElementById('login-error');
  var btn = e.target.querySelector('button'); setLoading(btn);
  try {
    var r = await fetch('/auth/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('username').value,password:document.getElementById('password').value})});
    var d = await r.json();
    if (r.ok) { window.location.href = '/dashboard'; }
    else { err.textContent = d.error; err.style.display = 'block'; }
  } catch(ex) { err.textContent = 'Connection failed'; err.style.display = 'block'; }
  finally { resetLoading(btn); }
});
</script>
{% endblock %}
